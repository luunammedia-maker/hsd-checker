<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>HSD Checker</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#111827;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:white;
    }

    .container{
      width:100%;
      max-width:430px;
      background:#1F2937;
      border-radius:24px;
      padding:24px;
      border:1px solid #374151;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .title{
      text-align:center;
      font-size:30px;
      font-weight:bold;
      color:#38BDF8;
      margin-bottom:24px;
    }
.source{
  margin-top:8px;
  font-size:13px;
  color:#9CA3AF;
  font-weight:normal;
  letter-spacing:0.5px;
}

    .input-group{
      margin-bottom:18px;
    }

    .label{
      display:block;
      margin-bottom:8px;
      color:#D1D5DB;
      font-size:14px;
    }

    input{
      width:100%;
      padding:16px;
      border:none;
      outline:none;
      border-radius:16px;
      background:#111827;
      border:1px solid #374151;
      color:white;
      font-size:18px;
      transition:0.2s;
      letter-spacing:1px;
    }

    input:focus{
      border-color:#38BDF8;
      box-shadow:0 0 0 3px rgba(56,189,248,0.15);
    }

    .hint{
      margin-top:6px;
      font-size:12px;
      color:#6B7280;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      background:#38BDF8;
      color:#111827;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.02);
    }

    .result{
      margin-top:24px;
      background:#111827;
      border-radius:20px;
      padding:20px;
      border:1px solid #374151;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:16px;
    }

    .row:last-child{
      margin-bottom:0;
    }

    .row-title{
      color:#D1D5DB;
      font-size:15px;
    }

    .value{
      font-weight:bold;
      font-size:16px;
    }

    .green{
      color:#22C55E;
    }

    .orange{
      color:#F59E0B;
    }

    .red{
      color:#EF4444;
    }

    .progress-wrapper{
      margin-top:20px;
    }

    .progress-title{
      margin-bottom:10px;
      font-size:14px;
      color:#D1D5DB;
    }

    .progress{
      width:100%;
      height:20px;
      background:#374151;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-bar{
      width:0%;
      height:100%;
      border-radius:999px;
      transition:0.5s;
      background:#22C55E;
    }

    .footer{
      margin-top:20px;
      text-align:center;
      color:#6B7280;
      font-size:12px;
    }

    @media(max-width:480px){

      .container{
        padding:20px;
      }

      .title{
        font-size:26px;
      }

      input{
        font-size:17px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      📦 HSD Checker

       <div class="source">
    Nguồn: Luunammedia
  </div>
    </div>

    <div class="input-group">

      <label class="label">
        Ngày sản xuất
      </label>

      <input
        type="text"
        id="mfg"
        placeholder="24052025"
        maxlength="10"
        inputmode="numeric"
      >

      <div class="hint">
        Nhập dạng: 24052025
      </div>

    </div>

    <div class="input-group">

      <label class="label">
        Hạn sử dụng
      </label>

      <input
        type="text"
        id="exp"
        placeholder="30122026"
        maxlength="10"
        inputmode="numeric"
      >

      <div class="hint">
        Nhập dạng: 30122026
      </div>

    </div>

    <button onclick="calculate()">
      Tính toán
    </button>

    <div class="result">

      <div class="row">
        <div class="row-title">
          ⏳ Tổng thời gian
        </div>

        <div class="value" id="totalDays">
          0 ngày
        </div>
      </div>

      <div class="row">
        <div class="row-title">
          ✅ HSD còn lại
        </div>

        <div class="value green" id="remainDays">
          0 ngày
        </div>
      </div>

      <div class="row">
        <div class="row-title">
          📊 % còn lại
        </div>

        <div class="value" id="percent">
          0%
        </div>
      </div>

      <div class="progress-wrapper">

        <div class="progress-title">
          Tiến trình HSD
        </div>

        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>

      </div>

    </div>

    <div class="footer">
      Dark Mode Mobile Optimized
    </div>

  </div>

  <script>

    function formatInput(input){

      input.addEventListener("input", function(){

        let value = this.value.replace(/\D/g,'');

        if(value.length > 8){
          value = value.substring(0,8);
        }

        if(value.length >= 5){

          value =
            value.substring(0,2) + "/" +
            value.substring(2,4) + "/" +
            value.substring(4);

        }
        else if(value.length >=3){

          value =
            value.substring(0,2) + "/" +
            value.substring(2);

        }

        this.value = value;

      });

    }

    formatInput(document.getElementById("mfg"));
    formatInput(document.getElementById("exp"));

    function parseDate(value){

      const clean = value.replace(/\D/g,'');

      if(clean.length !== 8){
        return null;
      }

      const day = clean.substring(0,2);
      const month = clean.substring(2,4);
      const year = clean.substring(4,8);

      return new Date(`${year}-${month}-${day}`);

    }

    function calculate(){

      const mfg =
        parseDate(document.getElementById("mfg").value);

      const exp =
        parseDate(document.getElementById("exp").value);

      if(!mfg || !exp || exp <= mfg){

        alert("Vui lòng nhập ngày hợp lệ");

        return;
      }

      const today = new Date();

      const total =
        Math.ceil((exp - mfg) / (1000*60*60*24));

      const remain =
        Math.ceil((exp - today) / (1000*60*60*24));

      let percent = (remain / total) * 100;

      if(percent < 0){
        percent = 0;
      }

      document.getElementById("totalDays").innerHTML =
        total + " ngày";

      document.getElementById("remainDays").innerHTML =
        remain + " ngày";

      document.getElementById("percent").innerHTML =
        percent.toFixed(2) + "%";

      const progressBar =
        document.getElementById("progressBar");

      progressBar.style.width =
        percent + "%";

      const remainText =
        document.getElementById("remainDays");

      const percentText =
        document.getElementById("percent");

      if(percent > 60){

        progressBar.style.background =
          "#22C55E";

        remainText.className =
          "value green";

        percentText.className =
          "value green";

      }
      else if(percent > 30){

        progressBar.style.background =
          "#F59E0B";

        remainText.className =
          "value orange";

        percentText.className =
          "value orange";

      }
      else{

        progressBar.style.background =
          "#EF4444";

        remainText.className =
          "value red";

        percentText.className =
          "value red";

      }

    }

  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HSD Checker</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#111827;
      color:#F9FAFB;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:420px;
      background:#1F2937;
      border-radius:22px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
      border:1px solid #374151;
    }

    .title{
      text-align:center;
      font-size:28px;
      font-weight:bold;
      margin-bottom:25px;
      color:#38BDF8;
    }

    .input-group{
      margin-bottom:18px;
    }

    .label{
      display:block;
      margin-bottom:8px;
      color:#D1D5DB;
      font-size:14px;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      outline:none;
      border-radius:14px;
      background:#111827;
      color:white;
      font-size:16px;
      border:1px solid #374151;
    }

    input:focus{
      border:1px solid #38BDF8;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:14px;
      background:#38BDF8;
      color:#111827;
      font-weight:bold;
      font-size:16px;
      cursor:pointer;
      transition:0.2s;
      margin-top:10px;
    }

    button:hover{
      transform:scale(1.02);
    }

    .result{
      margin-top:25px;
      background:#111827;
      border-radius:18px;
      padding:18px;
      border:1px solid #374151;
    }

    .row{
      display:flex;
      justify-content:space-between;
      margin-bottom:14px;
      font-size:15px;
    }

    .value{
      font-weight:bold;
    }

    .green{
      color:#22C55E;
    }

    .orange{
      color:#F59E0B;
    }

    .red{
      color:#EF4444;
    }

    .progress-box{
      margin-top:18px;
    }

    .progress-title{
      margin-bottom:10px;
      font-size:14px;
      color:#D1D5DB;
    }

    .progress{
      width:100%;
      height:18px;
      background:#374151;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-bar{
      height:100%;
      width:0%;
      border-radius:999px;
      transition:0.5s;
      background:#22C55E;
    }

    .footer{
      margin-top:20px;
      text-align:center;
      color:#6B7280;
      font-size:12px;
    }

    @media(max-width:480px){
      .container{
        padding:18px;
      }

      .title{
        font-size:24px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      📦 HSD Checker
    </div>

    <div class="input-group">
      <label class="label">Ngày sản xuất</label>
      <input type="date" id="mfg">
    </div>

    <div class="input-group">
      <label class="label">Hạn sử dụng</label>
      <input type="date" id="exp">
    </div>

    <button onclick="calculate()">
      Tính toán
    </button>

    <div class="result">

      <div class="row">
        <span>Tổng thời gian:</span>
        <span class="value" id="totalDays">0 ngày</span>
      </div>

      <div class="row">
        <span>HSD còn lại:</span>
        <span class="value" id="remainDays">0 ngày</span>
      </div>

      <div class="row">
        <span>% HSD còn lại:</span>
        <span class="value" id="percent">0%</span>
      </div>

      <div class="progress-box">
        <div class="progress-title">Tiến trình HSD</div>

        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

    </div>

    <div class="footer">
      Dark Mode Dashboard
    </div>

  </div>

  <script>

    function calculate(){

      const mfg = new Date(document.getElementById("mfg").value);
      const exp = new Date(document.getElementById("exp").value);

      if(!mfg || !exp || exp <= mfg){
        alert("Vui lòng nhập ngày hợp lệ");
        return;
      }

      const today = new Date();

      const total = Math.ceil((exp - mfg) / (1000*60*60*24));
      const remain = Math.ceil((exp - today) / (1000*60*60*24));

      let percent = (remain / total) * 100;

      if(percent < 0){
        percent = 0;
      }

      document.getElementById("totalDays").innerHTML =
        total + " ngày";

      document.getElementById("remainDays").innerHTML =
        remain + " ngày";

      document.getElementById("percent").innerHTML =
        percent.toFixed(2) + "%";

      const bar = document.getElementById("progressBar");

      bar.style.width = percent + "%";

      if(percent > 60){
        bar.style.background = "#22C55E";
      }
      else if(percent > 30){
        bar.style.background = "#F59E0B";
      }
      else{
        bar.style.background = "#EF4444";
      }

    }

  </script>

</body>
</html>
